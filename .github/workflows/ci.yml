name: CI - Build and Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    name: Build images and scan for vulnerabilities
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t guestbook-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t guestbook-frontend:ci ./frontend

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: guestbook-backend:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: guestbook-frontend:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Fail build if CRITICAL vulnerabilities in backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: guestbook-backend:ci
          format: table
          severity: CRITICAL
          exit-code: '1'

      - name: Fail build if CRITICAL vulnerabilities in frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: guestbook-frontend:ci
          format: table
          severity: CRITICAL
          exit-code: '1'
